<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MET Wayfinder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ─── Met-inspired editorial styling ─── */
  :root {
    --met-red: #E4002B;
    --met-red-dark: #B8001F;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-muted: #8a8a8a;
    --rule: #e5e5e5;
    --rule-soft: #f0f0f0;
    --bg: #ffffff;
    --bg-alt: #f7f5f2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    background: var(--bg);
    padding: 40px 32px 48px;
  }

  /* ─── Header ─── */
  .header {
    text-align: left;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule);
  }

  .header h1 {
    font-family: 'Lora', Georgia, 'Times New Roman', serif;
    font-size: 36px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .header .subtitle {
    color: var(--ink-muted);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
  }

  /* ─── Question counter ─── */
  .question-counter {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-muted);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .question-counter strong {
    color: var(--met-red);
    font-weight: 600;
  }

  /* ─── Progress ─── */
  .progress {
    background: var(--rule-soft);
    height: 2px;
    border-radius: 0;
    margin-bottom: 48px;
    overflow: hidden;
  }

  .progress-bar {
    background: var(--met-red);
    height: 100%;
    width: 0;
    transition: width 0.3s ease;
  }

  /* ─── Question ─── */
  .question {
    display: none;
  }

  .question.active {
    display: block;
    animation: fadeIn 0.4s;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question h2 {
    font-family: 'Lora', Georgia, serif;
    font-size: 30px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 12px;
    letter-spacing: -0.01em;
    line-height: 1.25;
  }

  .question .instruction {
    color: var(--ink-muted);
    font-size: 14px;
    margin-bottom: 32px;
    font-style: normal;
  }

  .question .genai-badge {
    display: inline-block;
    background: transparent;
    color: var(--met-red);
    padding: 0;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 12px;
    border-left: 2px solid var(--met-red);
    padding-left: 10px;
  }

  /* ─── Text options (Q1-Q3) ─── */
  .options {
    display: grid;
    gap: 0;
    margin-bottom: 40px;
    border-top: 1px solid var(--rule);
  }

  .option {
    background: var(--bg);
    border: none;
    border-bottom: 1px solid var(--rule);
    border-radius: 0;
    padding: 20px 4px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .option::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 0;
    background: var(--met-red);
    transition: width 0.15s;
  }

  .option:hover {
    background: var(--bg-alt);
    padding-left: 16px;
  }

  .option.selected {
    background: var(--bg-alt);
    padding-left: 16px;
  }

  .option.selected::before {
    width: 3px;
  }

  .option-label {
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .option-description {
    font-size: 13px;
    color: var(--ink-muted);
  }

  /* ─── Image options (Q4-Q7) ─── */
  .image-option {
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 0;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
  }

  .image-option:hover {
    border-color: var(--ink);
  }

  .image-option.selected {
    border-color: var(--met-red);
    border-width: 2px;
  }

  .image-option.selected .info {
    background: var(--met-red);
    color: #fff;
  }

  .image-option.selected .info .title,
  .image-option.selected .info .meta {
    color: #fff;
  }

  .image-option img {
    width: 100%;
    height: 180px;
    object-fit: contain;
    background: #000;
    display: block;
  }

  .image-option img.cover {
    object-fit: cover;
  }

  .image-option .info {
    padding: 10px 12px 12px;
    background: var(--bg);
    transition: background 0.2s;
  }

  .image-option .title {
    font-family: 'Lora', Georgia, serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 2px;
    line-height: 1.3;
  }

  .image-option .meta {
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.02em;
  }

  .image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  /* ─── Word pills (Q9) ─── */
  .word-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 40px;
  }

  .word-pill {
    background: var(--bg);
    border: 1px solid var(--ink);
    color: var(--ink);
    padding: 10px 18px;
    border-radius: 0;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }

  .word-pill:hover {
    background: var(--ink);
    color: var(--bg);
  }

  .word-pill.selected {
    background: var(--met-red);
    border-color: var(--met-red);
    color: #fff;
  }

  .timer {
    text-align: center;
    font-family: 'Lora', Georgia, serif;
    font-size: 40px;
    font-weight: 500;
    color: var(--met-red);
    margin: 24px 0;
  }

  /* ─── Buttons ─── */
  .nav-buttons {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
  }

  .nav-buttons-top {
    margin-top: 0;
    margin-bottom: 32px;
    padding-top: 0;
    border-top: none;
  }

  .btn {
    background: var(--met-red);
    border: 1px solid var(--met-red);
    color: #fff;
    padding: 12px 28px;
    border-radius: 0;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover {
    background: var(--met-red-dark);
    border-color: var(--met-red-dark);
  }

  .btn:disabled {
    background: var(--rule);
    border-color: var(--rule);
    color: var(--ink-muted);
    cursor: not-allowed;
  }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
  }

  .btn-secondary:hover {
    background: var(--ink);
    border-color: var(--ink);
    color: #fff;
  }

  /* ─── Results ─── */
  .results {
    display: none;
  }

  .results.active {
    display: block;
  }

  .results h2 {
    font-family: 'Lora', Georgia, serif;
    font-size: 32px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 28px;
    text-align: left;
    letter-spacing: -0.01em;
  }

  .result-item {
    background: transparent;
    border-left: none;
    border-bottom: 1px solid var(--rule);
    padding: 16px 0;
    margin-bottom: 0;
    border-radius: 0;
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 20px;
    align-items: baseline;
  }

  .result-item strong {
    color: var(--ink-muted);
    display: block;
    margin-bottom: 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
  }

  .result-item .value {
    color: var(--ink);
    font-size: 15px;
    font-weight: 500;
  }

  /* ─── Loading ─── */
  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-muted);
  }

  .spinner {
    border: 2px solid var(--rule);
    border-top: 2px solid var(--met-red);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* ─── Mobile ─── */
  @media (max-width: 768px) {
    .container {
      padding: 20px 16px 32px;
    }
    .header {
      margin-bottom: 24px;
      padding-bottom: 16px;
    }
    .header h1 {
      font-size: 24px;
    }
    .progress {
      margin-bottom: 24px;
    }
    .question h2 {
      font-size: 22px;
    }
    .question .instruction {
      margin-bottom: 20px;
      font-size: 13px;
    }
    .image-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .image-option img {
      height: 120px;
    }
    .image-option .info {
      padding: 8px 8px 10px;
    }
    .image-option .title {
      font-size: 12px;
    }
    .image-option .meta {
      font-size: 10px;
    }
    .option {
      padding: 14px 4px;
    }
    .option-label {
      font-size: 15px;
    }
    .option-description {
      font-size: 12px;
    }
    .word-cloud {
      gap: 6px;
    }
    .word-pill {
      padding: 8px 14px;
      font-size: 13px;
    }
    .nav-buttons {
      margin-top: 20px;
      padding-top: 16px;
    }
    .btn {
      padding: 10px 20px;
      font-size: 12px;
    }
    .timer {
      font-size: 32px;
      margin: 16px 0;
    }
  }

  @media (max-width: 480px) {
    .container {
      padding: 16px 12px 24px;
    }
    .header h1 {
      font-size: 20px;
    }
    .question h2 {
      font-size: 18px;
    }
    .image-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }
    .image-option img {
      height: 100px;
    }
    .image-option .title {
      font-size: 11px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>MET Wayfinder</h1>
    <p class="subtitle">Your personalized museum tour</p>
  </div>

  <div class="question-counter" id="questionCounter"></div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="nav-buttons nav-buttons-top">
    <button class="btn btn-secondary" id="backBtn" onclick="previousQuestion()" style="display:none">Back</button>
    <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none">Next</button>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading survey data...</p>
  </div>

  <div id="questions"></div>

  <div id="results" class="results"></div>
</div>

<script>
// Survey state
let surveyData = {
  objects: [],
  embeddings: {},
  pools: null,
  config: null,
  currentQuestion: 0,
  totalQuestions: 9,
  answers: {}
};

let questions = [];

// Load data
async function loadData() {
  try {
    const [csvResponse, embeddingsResponse, poolsResponse, configResponse, galleriesResponse] = await Promise.all([
      fetch('../data/asian_art_on_view.csv'),
      fetch('../data/text_embeddings.json'),
      fetch('../data/survey_pools.json'),
      fetch('../data/survey_config.json'),
      fetch('../data/all_galleries.json')
    ]);

    const csvText = await csvResponse.text();
    surveyData.objects = parseCSV(csvText);
    surveyData.embeddings = await embeddingsResponse.json();
    surveyData.pools = await poolsResponse.json();
    surveyData.config = await configResponse.json();

    const galleriesList = await galleriesResponse.json();
    surveyData.galleryMeta = {};
    galleriesList.forEach(g => {
      if (g.gallery_number) {
        surveyData.galleryMeta[String(g.gallery_number)] = g;
      }
    });

    document.getElementById('loading').style.display = 'none';

    // Generate all questions
    generateQuestions();
    showQuestion(0);

  } catch (error) {
    document.getElementById('loading').innerHTML = `
      <p style="color: #ff6b6b;">Error loading data: ${error.message}</p>
      <p style="font-size: 12px; margin-top: 10px;">Make sure the data files exist in ../data/</p>
    `;
  }
}

function shuffle(arr) {
  return arr.slice().sort(() => 0.5 - Math.random());
}

const CULTURE_LABELS = {
  east_asia: 'China',
  japan: 'Japan',
  korea: 'Korea',
  south_asia: 'South Asia',
  southeast_asia: 'Southeast Asia',
  himalayan: 'Himalayan'
};

const MATERIAL_LABELS = {
  ceramics: 'ceramics',
  sculpture: 'sculpture',
  metalwork: 'metalwork',
  jade_hardstone: 'jade & hardstone',
  paintings: 'paintings',
  textiles: 'textiles',
  lacquer: 'lacquer',
  prints: 'prints',
  calligraphy: 'calligraphy',
  wood: 'woodwork',
  glass: 'glass'
};

function humanizeCulture(key) {
  return CULTURE_LABELS[key] || key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function humanizeMaterial(key) {
  return MATERIAL_LABELS[key] || key.replace(/_/g, ' ').toLowerCase();
}

function joinList(items) {
  if (items.length <= 1) return items.join('');
  if (items.length === 2) return `${items[0]} and ${items[1]}`;
  return items.slice(0, -1).join(', ') + ', and ' + items[items.length - 1];
}

function previewToOption(p, extra = {}) {
  return {
    value: extra.value || String(p.id),
    object_id: p.id,
    title: p.title,
    culture: p.culture,
    medium: p.classification,
    date: p.date,
    gallery: p.gallery,
    alt_text: p.alt_text,
    image_url: p.image_thumb || p.image_url,
    class_group: p.class_group,
    culture_group: p.culture_group,
    era: p.era,
    highlight: p.highlight,
    ...extra
  };
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');

  return lines.slice(1).map(line => {
    const values = parseCSVLine(line);
    const obj = {};
    headers.forEach((header, i) => {
      obj[header] = values[i] || '';
    });
    return obj;
  });
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += char;
    }
  }
  result.push(current);
  return result;
}

function cleanText(text) {
  return text ? text.trim().replace(/^"|"$/g, '').trim() : '';
}

// Generate all questions
function generateQuestions() {
  questions = [
    generateQ1(),
    generateQ2(),
    generateQ3(),
    generateQ4(),
    generateQ5(),
    null, // Q6 - generated after Q4 + Q5 answered
    null, // Q7 - generated after Q2, Q3, Q4, Q5 answered
    null, // Q8 - generated after Q4 + Q5 so gallery previews align
    generateQ9()
  ];
}

function generateQ1() {
  return {
    id: 'q1',
    type: 'single',
    question: 'How long do you have at the MET today?',
    options: [
      { value: 30, label: '⏱️ Quick Visit (30 min)', desc: '3-4 stops' },
      { value: 60, label: '🚶 Focused Tour (1 hour)', desc: '5-6 stops' },
      { value: 120, label: '🎨 Deep Dive (2 hours)', desc: '10-12 stops' },
      { value: 180, label: '🏛️ Full Experience (3+ hours)', desc: '15+ stops' }
    ]
  };
}

function generateQ2() {
  return {
    id: 'q2',
    type: 'single',
    question: 'How do you want to experience the museum today?',
    options: [
      { value: 'curated', label: '🎯 Guide me - I want a curated journey', desc: 'Structured path with detailed information' },
      { value: 'balanced', label: '🗺️ Balance - Direction with room to explore', desc: 'Suggested route with flexibility' },
      { value: 'free', label: '🦋 Free spirit - I want to wander', desc: 'Loose suggestions, maximum serendipity' }
    ]
  };
}

function generateQ3() {
  return {
    id: 'q3',
    type: 'single',
    question: 'How do you like to explore art?',
    options: [
      { value: 'focused', label: '🎯 Go Deep - Immerse me in one story', desc: 'Focus on single theme with deep connections' },
      { value: 'mixed', label: '🌈 Mix It Up - Variety with connections', desc: 'Balanced journey through related themes' },
      { value: 'variety', label: '🎨 Surprise Me - Maximum variety', desc: 'Different cultures, periods, styles at every stop' }
    ]
  };
}

function generateQ4() {
  // One card per material group, using a highlight artwork as the representative image
  // and the material name as the prominent label (mirrors Q5's region cards).
  const materialGroups = [
    { key: 'ceramics', label: 'Ceramics' },
    { key: 'sculpture', label: 'Sculpture' },
    { key: 'metalwork', label: 'Metalwork' },
    { key: 'jade_hardstone', label: 'Jade & Hardstone' },
    { key: 'paintings', label: 'Paintings' },
    { key: 'textiles', label: 'Textiles' }
  ];
  const options = [];

  materialGroups.forEach(group => {
    const pool = (surveyData.pools.by_classification[group.key] || []);
    if (!pool.length) return;
    const highlights = pool.filter(p => p.highlight);
    const samplePool = highlights.length ? highlights : pool;
    const p = shuffle(samplePool)[0];
    options.push(previewToOption(p, {
      value: group.key,
      material_type: group.key,
      headline: group.label,
      subhead: p.title
    }));
  });

  return {
    id: 'q4',
    type: 'image_multi',
    question: 'Which materials speak to you?',
    instruction: 'Select as many as you like (at least 1)',
    minSelect: 1,
    maxSelect: 8,
    options: shuffle(options)
  };
}

function generateQ5() {
  // Sample from survey_pools.by_culture — one preview per culture region
  const cultureGroups = [
    { key: 'east_asia', label: 'China' },
    { key: 'japan', label: 'Japan' },
    { key: 'korea', label: 'Korea' },
    { key: 'south_asia', label: 'South Asia' },
    { key: 'southeast_asia', label: 'Southeast Asia' },
    { key: 'himalayan', label: 'Himalayan' }
  ];
  const perGroup = 1;
  const options = [];

  cultureGroups.forEach(group => {
    const pool = (surveyData.pools.by_culture[group.key] || []);
    const highlights = pool.filter(p => p.highlight);
    const samplePool = highlights.length >= perGroup ? highlights : pool;
    shuffle(samplePool).slice(0, perGroup).forEach(p => {
      options.push(previewToOption(p, { value: group.key, culture_label: group.label }));
    });
  });

  return {
    id: 'q5',
    type: 'image_multi',
    question: 'Which regions draw you in?',
    instruction: 'Select as many as you like (at least 1)',
    minSelect: 1,
    maxSelect: 6,
    options: shuffle(options)
  };
}

function generateQ6(materials, cultures) {
  // materials and cultures are arrays of keys (e.g., ['ceramics','metalwork'], ['japan','korea'])
  const mats = materials || [];
  const cults = cultures || [];

  // Union of all objects in selected classifications, deduped by id
  const seen = new Set();
  const pool = [];
  mats.forEach(m => {
    (surveyData.pools.by_classification[m] || []).forEach(p => {
      if (!seen.has(p.id)) { seen.add(p.id); pool.push(p); }
    });
  });

  // If cultures selected, narrow to items in those culture_groups
  const filtered = cults.length
    ? pool.filter(p => cults.includes(p.culture_group))
    : pool;

  // Fallback if intersection is too thin
  const base = filtered.length >= 3 ? filtered : (pool.length >= 3 ? pool : surveyData.pools.highlights);
  const highlights = base.filter(p => p.highlight);
  const samplePool = highlights.length >= 3 ? highlights : base;
  const samples = shuffle(samplePool).slice(0, 3);

  const matLabel = mats.length ? joinList(mats.map(humanizeMaterial)) : 'art';
  const cultLabel = cults.length ? ` from ${joinList(cults.map(humanizeCulture))}` : '';

  return {
    id: 'q6',
    type: 'image',
    question: `You're drawn to ${matLabel}${cultLabel}. Which piece speaks to you?`,
    instruction: 'Choose the one that draws you in',
    genai: `Filtered by materials=[${mats.join(',')}] × cultures=[${cults.join(',')}]`,
    options: samples.map(p => previewToOption(p, { value: String(p.id) }))
  };
}

function generateQ7(freedom, depth, materials, cultures) {
  const mats = materials || [];
  const cults = cultures || [];

  // Union pool over selected classifications
  const seen = new Set();
  const pool = [];
  mats.forEach(m => {
    (surveyData.pools.by_classification[m] || []).forEach(p => {
      if (!seen.has(p.id)) { seen.add(p.id); pool.push(p); }
    });
  });
  const narrowed = cults.length
    ? pool.filter(p => cults.includes(p.culture_group))
    : pool;
  let filtered = narrowed.length >= 4 ? narrowed : (pool.length >= 4 ? pool : surveyData.pools.highlights);

  let question = '';
  let samplePool = filtered;

  const matLabel = mats[0] ? humanizeMaterial(mats[0]) : 'these';

  if (depth === 'focused') {
    if (freedom === 'curated') {
      question = `Let's go deep. Pick 2 masterpieces to study closely.`;
      samplePool = filtered.filter(p => p.highlight);
    } else if (freedom === 'balanced') {
      question = `Explore ${matLabel} evolution. Pick 2 from different styles.`;
    } else {
      question = `Deep dive into ${matLabel} surprises. Pick 2 hidden gems.`;
      samplePool = filtered.filter(p => !p.highlight);
    }
  } else if (depth === 'mixed') {
    question = `A mix of pieces. Pick 2 that intrigue you.`;
  } else {
    question = `Different styles. Pick 2 that surprise you.`;
  }

  samplePool = samplePool.length >= 4 ? samplePool : filtered;
  const samples = shuffle(samplePool).slice(0, 4);

  return {
    id: 'q7',
    type: 'image_multi',
    question: question,
    instruction: 'Select 2 artworks',
    maxSelect: 2,
    genai: `freedom=${freedom}, depth=${depth}, materials=[${mats.join(',')}], cultures=[${cults.join(',')}]`,
    options: samples.map(p => previewToOption(p, { value: String(p.id) }))
  };
}

function generateQ8() {
  // Use gallery room photos (from livingmap/Met) instead of random object images.
  const cfgGalleries = surveyData.config.galleries || {};
  const selectedMaterials = surveyData.answers.q4 || [];
  const selectedCultures = surveyData.answers.q5 || [];

  // Rank galleries by on-view count, prefer ones matching user's q4/q5 selections,
  // and keep only galleries that actually have a room photo.
  const ranked = Object.entries(cfgGalleries)
    .map(([g, count]) => {
      const meta = surveyData.galleryMeta[g];
      const preview = surveyData.pools.gallery_previews[g];
      if (!meta || !meta.image_url) return null;
      let score = 0;
      if (preview) {
        if (selectedMaterials.includes(preview.class_group)) score += 2;
        if (selectedCultures.includes(preview.culture_group)) score += 2;
      }
      return { gallery: g, meta, preview, score, count };
    })
    .filter(Boolean)
    .sort((a, b) => b.score - a.score || b.count - a.count);

  const picks = ranked.slice(0, 4);

  const options = picks.map(s => ({
    value: s.gallery,
    gallery: s.gallery,
    image_url: s.meta.image_url,
    alt_text: s.meta.long_name || `Gallery ${s.gallery}`,
    headline: s.meta.long_name || `Gallery ${s.gallery}`,
    subhead: `Gallery ${s.gallery} • ${s.meta.floor_name || ''}`.trim(),
    hideId: true
  }));

  return {
    id: 'q8',
    type: 'image',
    question: 'Which gallery space calls to you?',
    instruction: 'Choose the one that appeals most',
    options: options
  };
}

function generateQ9() {
  const poolWords = (surveyData.pools && surveyData.pools.emotion_words) || [];
  const capitalized = poolWords.map(w => w.charAt(0).toUpperCase() + w.slice(1));
  const shuffled = shuffle(capitalized);

  return {
    id: 'q9',
    type: 'words',
    question: 'Quick! Pick 3 words that excite you',
    instruction: '(Go with your gut — pick 3)',
    maxSelect: 3,
    options: shuffled.map(word => ({ value: word, label: word }))
  };
}

// Show question
function showQuestion(index) {
  surveyData.currentQuestion = index;

  // Update progress
  const progress = ((index + 1) / surveyData.totalQuestions) * 100;
  document.getElementById('progressBar').style.width = progress + '%';
  document.getElementById('questionCounter').innerHTML =
    `Question <strong>${index + 1}</strong> of ${surveyData.totalQuestions}`;

  // Generate dynamic questions if needed
  if (index === 5 && !questions[5]) {
    questions[5] = generateQ6(surveyData.answers.q4, surveyData.answers.q5);
  }
  if (index === 6 && !questions[6]) {
    questions[6] = generateQ7(
      surveyData.answers.q2,
      surveyData.answers.q3,
      surveyData.answers.q4,
      surveyData.answers.q5
    );
  }
  if (index === 7 && !questions[7]) {
    questions[7] = generateQ8();
  }

  const question = questions[index];
  const container = document.getElementById('questions');

  container.innerHTML = renderQuestion(question);

  // Show/hide nav buttons
  document.getElementById('backBtn').style.display = index > 0 ? 'inline-block' : 'none';
  document.getElementById('nextBtn').style.display = 'inline-block';
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('nextBtn').textContent = index === surveyData.totalQuestions - 1 ? 'Finish' : 'Next';
}

function renderQuestion(q) {
  let html = `<div class="question active">`;

  if (q.genai) {
    html += `<span class="genai-badge">🤖 AI Generated</span>`;
  }

  html += `<h2>${q.question}</h2>`;

  if (q.instruction) {
    html += `<p class="instruction">${q.instruction}</p>`;
  }

  if (q.timer) {
    html += `<div class="timer" id="timer">${q.timer}</div>`;
  }

  if (q.type === 'single') {
    html += `<div class="options">`;
    q.options.forEach((opt, i) => {
      html += `
        <div class="option" onclick="selectOption('${q.id}', '${opt.value}', this)">
          <div class="option-label">${opt.label}</div>
          <div class="option-description">${opt.desc}</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  if (q.type === 'image' || q.type === 'image_multi') {
    html += `<div class="image-grid">`;
    q.options.forEach((opt, i) => {
      const imageUrl = opt.image_url
        || `https://collectionapi.metmuseum.org/api/collection/v1/iiif/${opt.object_id}/full/!400,400/0/default.jpg`;
      const altText = opt.alt_text || opt.title || '';
      const isProminent = !!(opt.headline || opt.culture_label);
      const primaryLabel = opt.headline || opt.culture_label || opt.title || '';
      let secondaryLabel;
      if (opt.subhead !== undefined) {
        secondaryLabel = opt.subhead;
      } else if (opt.culture_label) {
        secondaryLabel = opt.title || '';
      } else {
        secondaryLabel = `${opt.culture || ''}${opt.date ? ' • ' + opt.date : ''}`;
      }
      const primaryStyle = isProminent
        ? 'font-size: 22px; font-weight: 600; letter-spacing: -0.01em;'
        : '';
      const tertiary = opt.hideId
        ? ''
        : `<div class="meta" style="margin-top: 4px; font-size: 10px;">Gallery ${opt.gallery} • ID: ${opt.object_id}</div>`;
      html += `
        <div class="image-option" onclick="selectImageOption('${q.id}', '${opt.value}', this, ${q.minSelect || 1}, ${q.maxSelect || 1})">
          <img class="${opt.hideId ? 'cover' : ''}" src="${imageUrl}" alt="${altText}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%22%232a2a4a%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23666%22 font-family=%22sans-serif%22%3ENo Image%3C/text%3E%3C/svg%3E'">
          <div class="info">
            <div class="title" style="${primaryStyle}">${primaryLabel}</div>
            <div class="meta">${secondaryLabel}</div>
            ${tertiary}
          </div>
        </div>
      `;
    });
    html += `</div>`;
  }

  if (q.type === 'words') {
    html += `<div class="word-cloud">`;
    q.options.forEach(opt => {
      html += `
        <div class="word-pill" onclick="selectWord('${q.id}', '${opt.value}', this, ${q.maxSelect})">
          ${opt.label}
        </div>
      `;
    });
    html += `</div>`;

    // Start timer
    if (q.timer) {
      setTimeout(() => startTimer(q.timer), 100);
    }
  }

  html += `</div>`;
  return html;
}

function selectOption(qid, value, element) {
  document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
  element.classList.add('selected');
  surveyData.answers[qid] = value;
  document.getElementById('nextBtn').disabled = false;
}

function selectImageOption(qid, value, element, minSelect, maxSelect) {
  if (maxSelect === 1 && minSelect === 1) {
    // Single selection mode
    document.querySelectorAll('.image-option').forEach(el => el.classList.remove('selected'));
    element.classList.add('selected');
    surveyData.answers[qid] = [value];
    document.getElementById('nextBtn').disabled = false;
  } else {
    // Multi-selection mode
    const currentlySelected = Array.from(document.querySelectorAll('.image-option.selected'));

    if (element.classList.contains('selected')) {
      // Deselect
      element.classList.remove('selected');
    } else {
      // Select (if under max limit)
      if (currentlySelected.length < maxSelect) {
        element.classList.add('selected');
      } else {
        return; // Don't allow more selections
      }
    }

    // Collect all selected values
    const selected = Array.from(document.querySelectorAll('.image-option.selected')).map(el => {
      const onclickStr = el.getAttribute('onclick');
      const match = onclickStr.match(/'([^']+)'/g);
      return match[1].replace(/'/g, '');
    });

    surveyData.answers[qid] = selected;

    // Enable next button if we have at least minSelect items
    document.getElementById('nextBtn').disabled = selected.length < minSelect;
  }
}

function selectWord(qid, value, element, maxSelect) {
  element.classList.toggle('selected');
  const selected = Array.from(document.querySelectorAll('.word-pill.selected')).map(el =>
    el.textContent.trim()
  );

  if (selected.length > maxSelect) {
    element.classList.remove('selected');
    return;
  }

  surveyData.answers[qid] = selected;
  document.getElementById('nextBtn').disabled = selected.length !== maxSelect;
}

function startTimer(seconds) {
  let remaining = seconds;
  const timerEl = document.getElementById('timer');

  const interval = setInterval(() => {
    remaining--;
    if (timerEl) timerEl.textContent = remaining;

    if (remaining <= 0) {
      clearInterval(interval);
      if (surveyData.answers.q9 && surveyData.answers.q9.length > 0) {
        document.getElementById('nextBtn').disabled = false;
      }
    }
  }, 1000);
}

function nextQuestion() {
  if (surveyData.currentQuestion < surveyData.totalQuestions - 1) {
    showQuestion(surveyData.currentQuestion + 1);

}

function previousQuestion() {
  if (surveyData.currentQuestion > 0) {

let tourMap = null;
let galleryGeoData = null;
let floorOutlineData = null;
let sectionData = null;
let otherRoomsData = null;
let roomConnections = null;
let roomDoors = null;

function filterByFloor(gj, floor) {
  return { type: 'FeatureCollection', features: gj.features.filter(f => (f.properties.floor_name || f.properties.floor) === floor) };
}

function getGalleryCentroid(galleryNum) {
  const num = String(galleryNum);
  const feat = galleryGeoData.features.find(f => f.properties.gallery_number === num);
  if (!feat) return null;
  const coords = feat.geometry.type === 'Polygon'
    ? feat.geometry.coordinates[0]
    : feat.geometry.coordinates[0][0];
  const n = coords.length - 1;
  if (n <= 0) return null;
  const cx = coords.slice(0, n).reduce((s, c) => s + c[0], 0) / n;
  const cy = coords.slice(0, n).reduce((s, c) => s + c[1], 0) / n;
  return [cx, cy];
}

// --- Pathing logic (from /viewer) ---

function getDoorBetween(a, b) {
  if (!roomDoors) return null;
  return roomDoors[`${a}-${b}`] || roomDoors[`${b}-${a}`] || null;
}

let adjacencyMap = null;
function getAdjacencyMap() {
  if (adjacencyMap) return adjacencyMap;
  adjacencyMap = {};
  roomConnections.features.forEach(f => {
    const a = f.properties.from, b = f.properties.to;
    if (!adjacencyMap[a]) adjacencyMap[a] = [];
    if (!adjacencyMap[b]) adjacencyMap[b] = [];
    if (!adjacencyMap[a].includes(b)) adjacencyMap[a].push(b);
    if (!adjacencyMap[b].includes(a)) adjacencyMap[b].push(a);
  });
  return adjacencyMap;
}

function findPathBFS(from, to) {
  if (from === to) return [from];
  const adj = getAdjacencyMap();
  const queue = [[from]];
  const visited = new Set([from]);
  while (queue.length > 0) {
    const path = queue.shift();
    const node = path[path.length - 1];
    for (const nb of (adj[node] || [])) {
      if (nb === to) return [...path, nb];
      if (!visited.has(nb)) { visited.add(nb); queue.push([...path, nb]); }
    }
  }
  return null;
}

// Smooth orthogonal pathing
const BLDG_ANGLE = -119 * Math.PI / 180;
const BLDG_COS = Math.cos(BLDG_ANGLE);
const BLDG_SIN = Math.sin(BLDG_ANGLE);
const LNG_SCALE = 0.7572;

function toBldg(p) {
  const x = p[0] * LNG_SCALE, y = p[1];
  return [x * BLDG_COS + y * BLDG_SIN, -x * BLDG_SIN + y * BLDG_COS];
}
function fromBldg(b) {
  const x = b[0] * BLDG_COS - b[1] * BLDG_SIN;
  const y = b[0] * BLDG_SIN + b[1] * BLDG_COS;
  return [x / LNG_SCALE, y];
}

function makeOrthogonal(coords) {
  const result = [coords[0]];
  for (let i = 1; i < coords.length; i++) {
    const prev = coords[i - 1], curr = coords[i];
    const bp = toBldg(prev), bc = toBldg(curr);
    const dx = bc[0] - bp[0], dy = bc[1] - bp[1];
    if (Math.abs(dx) < 0.0000001 || Math.abs(dy) < 0.0000001) { result.push(curr); continue; }
    const nextPt = i < coords.length - 1 ? coords[i + 1] : null;
    let hFirst;
    if (nextPt) { const bn = toBldg(nextPt); hFirst = Math.abs(bn[1] - bc[1]) >= Math.abs(bn[0] - bc[0]); }
    else { hFirst = Math.abs(dx) > Math.abs(dy); }
    result.push(hFirst ? fromBldg([bc[0], bp[1]]) : fromBldg([bp[0], bc[1]]));
    result.push(curr);
  }
  return result;
}

function roundCorners(coords) {
  if (coords.length < 3) return coords;
  const RADIUS = 0.00012, STEPS = 8;
  const result = [coords[0]];
  for (let i = 1; i < coords.length - 1; i++) {
    const prev = coords[i - 1], curr = coords[i], next = coords[i + 1];
    let dx1 = prev[0] - curr[0], dy1 = prev[1] - curr[1];
    let dx2 = next[0] - curr[0], dy2 = next[1] - curr[1];
    const len1 = Math.sqrt(dx1*dx1 + dy1*dy1), len2 = Math.sqrt(dx2*dx2 + dy2*dy2);
    if (len1 === 0 || len2 === 0) { result.push(curr); continue; }
    const r = Math.min(RADIUS, len1 * 0.4, len2 * 0.4);
    dx1 /= len1; dy1 /= len1; dx2 /= len2; dy2 /= len2;
    const start = [curr[0] + dx1*r, curr[1] + dy1*r];
    const end = [curr[0] + dx2*r, curr[1] + dy2*r];
    result.push(start);
    for (let s = 1; s < STEPS; s++) {
      const t = s/STEPS, u = 1-t;
      result.push([u*u*start[0] + 2*u*t*curr[0] + t*t*end[0], u*u*start[1] + 2*u*t*curr[1] + t*t*end[1]]);
    }
    result.push(end);
  }
  result.push(coords[coords.length - 1]);
  return result;
}

function smoothPath(coords) {
  if (coords.length < 2) return coords;
  return roundCorners(makeOrthogonal(coords));
}

function buildRouteLineCoords(routeData) {
  const stops = routeData.route;
  const stopGalleries = new Set(stops.map(s => String(s.gallery)));

  // Expand into full room-by-room path
  const fullPath = [];
  for (let i = 0; i < stops.length; i++) {
    const a = String(stops[i].gallery);
    if (i === 0) fullPath.push({ room: a, isStop: true });
    if (i < stops.length - 1) {
      const b = String(stops[i + 1].gallery);
      const direct = getDoorBetween(a, b);
      if (direct) {
        fullPath.push({ room: b, isStop: true });
      } else {
        const path = findPathBFS(a, b);
        if (path && path.length > 1) {
          for (let j = 1; j < path.length; j++)
            fullPath.push({ room: path[j], isStop: stopGalleries.has(path[j]) });
        } else {
          fullPath.push({ room: b, isStop: true });
        }
      }
    }
  }

  // Remove backtracking
  const usedEdges = new Set();
  const cleanPath = [fullPath[0]];
  for (let i = 1; i < fullPath.length; i++) {
    const prevRoom = cleanPath[cleanPath.length - 1].room;
    const currRoom = fullPath[i].room;
    const edge = [prevRoom, currRoom].sort().join('|');
    if (usedEdges.has(edge) && !fullPath[i].isStop) continue;
    usedEdges.add(edge);
    cleanPath.push(fullPath[i]);
  }

  // Build coordinates with door waypoints
  const lineCoords = [];
  for (let i = 0; i < cleanPath.length; i++) {
    const curr = cleanPath[i];
    const prev = i > 0 ? cleanPath[i - 1] : null;
    const next = i < cleanPath.length - 1 ? cleanPath[i + 1] : null;
    const entryDoor = prev ? getDoorBetween(prev.room, curr.room) : null;
    const exitDoor = next ? getDoorBetween(curr.room, next.room) : null;
    if (curr.isStop) {
      if (entryDoor) lineCoords.push([entryDoor.lng, entryDoor.lat]);
      const c = getGalleryCentroid(curr.room);
      if (c) lineCoords.push(c);
      if (exitDoor) lineCoords.push([exitDoor.lng, exitDoor.lat]);
    } else {
      if (entryDoor) lineCoords.push([entryDoor.lng, entryDoor.lat]);
    }
  }

  return smoothPath(lineCoords);
}

async function loadTourMap(routeData) {
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.js';
  const link = document.createElement('link');
  link.href = 'https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.css';
  link.rel = 'stylesheet';
  document.head.appendChild(link);

  script.onload = async () => {
    // Load all geojson layers (same as viewer)
    const [galleries, floors, sections, others, connections, doors] = await Promise.all([
      fetch('/data/gallery_rooms.geojson').then(r => r.json()),
      fetch('/data/floor_outlines.geojson').then(r => r.json()),
      fetch('/data/section_areas.geojson').then(r => r.json()),
      fetch('/data/other_rooms.geojson').then(r => r.json()),
      fetch('/data/room_connections.geojson').then(r => r.json()),
      fetch('/data/room_doors.json').then(r => r.json()).catch(() => ({})),
    ]);
    galleryGeoData = galleries;
    floorOutlineData = floors;
    sectionData = sections;
    otherRoomsData = others;
    roomConnections = connections;
    roomDoors = doors;

    const floor = 'Floor 2';

    tourMap = new maplibregl.Map({
      container: 'tourMap',
      style: {
        version: 8, sources: {},
        layers: [{ id: 'background', type: 'background', paint: { 'background-color': '#e8e0d0' } }],
        glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf'
      },
      center: [-73.9635, 40.7794],
      zoom: 17.5,
      bearing: 118.5,
      pitch: 0,
      maxZoom: 21,
      minZoom: 15,
    });

    tourMap.on('load', () => {
      // Sources (same as viewer)
      tourMap.addSource('floor-outline', { type: 'geojson', data: filterByFloor(floorOutlineData, floor) });
      tourMap.addSource('sections', { type: 'geojson', data: filterByFloor(sectionData, floor) });
      tourMap.addSource('other-rooms', { type: 'geojson', data: filterByFloor(otherRoomsData, floor) });
      tourMap.addSource('galleries', { type: 'geojson', data: filterByFloor(galleryGeoData, floor) });
      tourMap.addSource('connections', { type: 'geojson', data: filterByFloor(roomConnections, floor) });
      tourMap.addSource('route-line', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      tourMap.addSource('route-stops', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

      // Layers (same style as viewer)
      tourMap.addLayer({ id: 'floor-outline-fill', type: 'fill', source: 'floor-outline', paint: { 'fill-color': '#fffdf7', 'fill-opacity': 1.0 } });
      tourMap.addLayer({ id: 'floor-outline-stroke', type: 'line', source: 'floor-outline', paint: { 'line-color': '#8a8078', 'line-width': 3 } });
      tourMap.addLayer({ id: 'section-fills', type: 'fill', source: 'sections', paint: { 'fill-color': '#f5f0e8', 'fill-opacity': 0.5 } });
      tourMap.addLayer({ id: 'other-room-fills', type: 'fill', source: 'other-rooms', paint: { 'fill-color': '#eee8dd', 'fill-opacity': 0.6 } });
      tourMap.addLayer({ id: 'other-room-outlines', type: 'line', source: 'other-rooms', paint: { 'line-color': '#ccc4b8', 'line-width': 1 } });

      // Gallery fills — highlight route galleries
      const routeGalleries = routeData.route.filter(s => s.is_target).map(s => String(s.gallery));
      tourMap.addLayer({ id: 'gallery-fills', type: 'fill', source: 'galleries',
        paint: {
          'fill-color': ['case', ['in', ['get', 'gallery_number'], ['literal', routeGalleries]], 'rgba(228,0,43,0.12)', '#f5f0e8'],
          'fill-opacity': 1
        }
      });
      tourMap.addLayer({ id: 'gallery-outlines', type: 'line', source: 'galleries',
        paint: { 'line-color': '#bbb4a8', 'line-width': 1 }
      });

      // Build step number map: gallery -> step number (matching sidebar)
      const routeGalleriesSet = new Set(routeData.route.map(s => String(s.gallery)));
      const galleryStepNum = {};
      let stepCounter = 0;
      routeData.route.forEach(stop => {
        const gnum = String(stop.gallery);
        if (!stop.is_revisit && !(gnum in galleryStepNum)) {
          stepCounter++;
          galleryStepNum[gnum] = stepCounter;
        }
      });

      // Gallery labels — HTML markers like the viewer
      window._galleryLabelMarkers = [];
      window._routeStopMarkers = [];

      galleryGeoData.features.filter(f => (f.properties.floor_name || f.properties.floor) === floor).forEach(feat => {
        const num = feat.properties.gallery_number;
        if (!num) return;
        const c = getGalleryCentroid(parseInt(num));
        if (!c) return;

        if (routeGalleriesSet.has(num)) {
          // Route gallery — red/grey circle with step number
          const isTarget = routeData.route.some(s => String(s.gallery) === num && s.is_target);
          const idx = routeData.route.findIndex(s => String(s.gallery) === num && !s.is_revisit);
          const stepNum = galleryStepNum[num] || '';
          const el = document.createElement('div');
          const size = isTarget ? 30 : 22;
          const inner = size - 6; // subtract border
          el.style.cssText = 'box-sizing:border-box;width:' + size + 'px;height:' + size + 'px;background:' + (isTarget ? '#e4002b' : '#999') + ';border:3px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:' + (isTarget ? '11' : '9') + 'px;color:#fff;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.3);font-family:IBM Plex Sans,sans-serif;text-align:center;line-height:' + inner + 'px;padding:0;padding-top:1px;';
          el.textContent = stepNum;
          if (idx >= 0) el.onclick = () => focusTourStop(idx);
          const marker = new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat(c).addTo(tourMap);
          window._routeStopMarkers.push(marker);
        } else {
          // Non-route gallery — plain text label
          const el = document.createElement('div');
          el.style.cssText = 'color:rgba(26,16,8,0.4);font-size:11px;font-weight:600;font-family:IBM Plex Sans,sans-serif;pointer-events:none;white-space:nowrap;text-align:center;line-height:1;';
          el.textContent = num;
          const marker = new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat(c).addTo(tourMap);
          window._galleryLabelMarkers.push(marker);
        }
      });

      // Route line — smooth orthogonal path through doors (same as viewer)
      const lineCoords = buildRouteLineCoords(routeData);

      if (lineCoords.length >= 2) {
        tourMap.getSource('route-line').setData({
          type: 'FeatureCollection',
          features: [{ type: 'Feature', geometry: { type: 'LineString', coordinates: lineCoords }, properties: {} }]
        });
      }

      // Route line layers — white outline + green line
      tourMap.addLayer({ id: 'route-line-outline', type: 'line', source: 'route-line',
        paint: { 'line-color': '#fff', 'line-width': 7, 'line-opacity': 0.7 } });
      tourMap.addLayer({ id: 'route-line-main', type: 'line', source: 'route-line',
        paint: { 'line-color': '#22c55e', 'line-width': 3.5, 'line-opacity': 1.0 } });

      // Fit to route — start in wayfinding mode (bearing 0)
      if (lineCoords.length > 0) {
        const bounds = new maplibregl.LngLatBounds();
        lineCoords.forEach(c => bounds.extend(c));
        window._routeBounds = bounds;
        tourMap.fitBounds(bounds, { padding: 80, duration: 1000, bearing: 0 });
      }

      // Start with route line red (wayfinding default)
      tourMap.setPaintProperty('route-line-main', 'line-color', '#e4002b');
    });
  };

  document.head.appendChild(script);
}

function focusTourStop(idx) {
  const stop = window._routeData.route[idx];
  if (!stop || !tourMap) return;

  const c = getGalleryCentroid(stop.gallery);
  if (c) {
    tourMap.flyTo({ center: c, zoom: 19.5, duration: 1000 });
  }

  document.querySelectorAll('.tour-stop').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
  });

  // Scroll sidebar to this stop
  const stopEl = document.querySelector(`.tour-stop[data-idx="${idx}"]`);
  if (stopEl) stopEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function downloadRoute() {
  const data = window._routeData;
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'met-tour-route.json';
  a.click();
  URL.revokeObjectURL(url);
}

let currentMapMode = 'detail';
let savedWayfindingView = null;

function setMapMode(mode) {
  if (!tourMap) return;
  currentMapMode = mode;

  document.getElementById('btnOverlay').classList.toggle('active', mode === 'overlay');
  document.getElementById('btnDetail').classList.toggle('active', mode === 'detail');

  const routeGalleries = window._routeData.route.filter(s => s.is_target).map(s => String(s.gallery));

  if (mode === 'overlay') {
    // Save current wayfinding camera so we can restore it
    savedWayfindingView = {
      center: tourMap.getCenter(),
      zoom: tourMap.getZoom(),
      bearing: tourMap.getBearing(),
    };

    // Hide route stop markers, show plain gallery labels
    (window._routeStopMarkers || []).forEach(m => m.getElement().style.display = 'none');
    (window._galleryLabelMarkers || []).forEach(m => m.getElement().style.display = '');

    tourMap.setPaintProperty('route-line-main', 'line-color', '#22c55e');
    tourMap.setPaintProperty('route-line-outline', 'line-color', 'rgba(255,255,255,0.5)');

    tourMap.setPaintProperty('gallery-fills', 'fill-color', [
      'case',
      ['in', ['get', 'gallery_number'], ['literal', routeGalleries]], 'rgba(34,197,94,0.15)',
      '#f5f0e8'
    ]);

    // Zoom out to show entire route with rotated bearing
    if (window._routeBounds) {
      tourMap.fitBounds(window._routeBounds, { padding: 60, duration: 800, bearing: 118.5 });
    }

  } else {
    // Wayfinding: show route stop markers, hide plain labels for route galleries
    (window._routeStopMarkers || []).forEach(m => m.getElement().style.display = '');
    (window._galleryLabelMarkers || []).forEach(m => m.getElement().style.display = '');

    tourMap.setPaintProperty('route-line-main', 'line-color', '#e4002b');
    tourMap.setPaintProperty('route-line-outline', 'line-color', '#fff');

    tourMap.setPaintProperty('gallery-fills', 'fill-color', [
      'case',
      ['in', ['get', 'gallery_number'], ['literal', routeGalleries]], 'rgba(228,0,43,0.12)',
      '#f5f0e8'
    ]);

    // Restore saved wayfinding view, or fit to route north-up
    if (savedWayfindingView) {
      tourMap.easeTo({
        center: savedWayfindingView.center,
        zoom: savedWayfindingView.zoom,
        bearing: savedWayfindingView.bearing,
        duration: 800,
      });
    } else if (window._routeBounds) {
      tourMap.fitBounds(window._routeBounds, { padding: 80, duration: 800, bearing: 0 });
    }
  }
}

// Initialize
loadData();
</script>

</body>
</html>
