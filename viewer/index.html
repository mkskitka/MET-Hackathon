<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Met Museum Floor Plan Viewer</title>
<script src="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'IBM Plex Sans', -apple-system, sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; }

  /* 3-column layout: galleries | objects | map */
  #app { display: flex; height: 100vh; }

  /* Column 1: Gallery tree */
  #col-galleries {
    width: 280px;
    flex-shrink: 0;
    background: #0e0e22;
    display: flex;
    flex-direction: column;
    border-right: 1px solid rgba(255,255,255,0.06);
  }

  /* Column 2: Object detail */
  #col-objects {
    width: 340px;
    flex-shrink: 0;
    background: #12122a;
    display: flex;
    flex-direction: column;
    border-right: 1px solid rgba(255,255,255,0.06);
    transition: width 0.2s;
  }
  #col-objects.collapsed { width: 0; overflow: hidden; border: none; }

  /* Column 3: Image viewer */
  #col-image {
    width: 0;
    flex-shrink: 0;
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.2s;
    border-right: 1px solid rgba(255,255,255,0.06);
  }
  #col-image.open { width: 420px; }

  .iv-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .iv-title {
    font-size: 12px;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .iv-close {
    background: none;
    border: none;
    color: #666;
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .iv-close:hover { color: #fff; }

  .iv-main {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #060612;
    position: relative;
    max-height: 40vh;
    min-height: 200px;
  }
  .iv-main img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .iv-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    border: none;
    color: #aaa;
    font-size: 22px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .iv-nav:hover { background: rgba(0,0,0,0.8); color: #fff; }
  .iv-nav.prev { left: 8px; }
  .iv-nav.next { right: 8px; }

  .iv-thumbs {
    display: flex;
    gap: 4px;
    padding: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .iv-thumbs::-webkit-scrollbar { height: 4px; }
  .iv-thumbs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .iv-thumb {
    width: 48px;
    height: 48px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.15s;
    border: 2px solid transparent;
  }
  .iv-thumb:hover { opacity: 0.7; }
  .iv-thumb.active { opacity: 1; border-color: #e4002b; }

  .iv-info {
    padding: 10px 14px;
    flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 11px;
    color: #666;
  }
  .iv-info-title { font-size: 13px; color: #ccc; font-weight: 500; }

  /* Column 4: Map */
  #map-wrap { flex: 1; position: relative; }
  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

  /* ─── Gallery column ─── */
  .gc-header {
    padding: 16px 14px 0;
    flex-shrink: 0;
  }
  .gc-header h1 { font-size: 14px; font-weight: 600; color: #fff; letter-spacing: 0.3px; }
  .gc-stats { font-size: 11px; color: #555; margin-top: 3px; }

  .gc-floors {
    display: flex;
    gap: 4px;
    padding: 10px 14px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .gc-floor-pill {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: #555;
    padding: 4px 10px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .gc-floor-pill:hover { background: rgba(255,255,255,0.08); color: #aaa; }
  .gc-floor-pill.active { background: #e4002b; border-color: #e4002b; color: #fff; }
  .gc-floor-pill.has-content { border-color: rgba(228,0,43,0.3); color: #888; }
  .gc-floor-pill .pill-ct { font-size: 9px; color: #666; margin-left: 2px; }
  .gc-floor-pill.active .pill-ct { color: rgba(255,255,255,0.6); }

  .gc-list {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 12px;
  }
  .gc-list::-webkit-scrollbar { width: 5px; }
  .gc-list::-webkit-scrollbar-track { background: transparent; }
  .gc-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

  .gc-section {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #444;
    padding: 12px 14px 4px;
    position: sticky;
    top: 0;
    background: #0e0e22;
    z-index: 2;
  }

  .gc-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }
  .gc-item:hover { background: rgba(255,255,255,0.03); }
  .gc-item.active { background: rgba(228,0,43,0.1); border-left-color: #e4002b; }
  .gc-item.no-data { opacity: 0.35; }

  .gc-num {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    min-width: 32px;
  }
  .gc-item.no-data .gc-num { color: #555; }
  .gc-name {
    font-size: 11px;
    color: #777;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gc-ct {
    font-size: 10px;
    color: #e4002b;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* ─── Object column ─── */
  .oc-header {
    padding: 16px 16px 12px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .oc-header-img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 10px;
    display: block;
  }
  .oc-title { font-size: 15px; font-weight: 600; color: #fff; }
  .oc-subtitle { font-size: 12px; color: #e4002b; font-weight: 500; margin-top: 2px; }
  .oc-meta { font-size: 11px; color: #666; margin-top: 4px; }
  .oc-desc {
    font-size: 11px;
    color: #555;
    line-height: 1.5;
    margin-top: 8px;
    max-height: 48px;
    overflow: hidden;
  }

  .oc-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  .oc-list::-webkit-scrollbar { width: 5px; }
  .oc-list::-webkit-scrollbar-track { background: transparent; }
  .oc-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

  .oc-obj {
    display: flex;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }
  .oc-obj:hover { background: rgba(255,255,255,0.04); }
  .oc-obj.active { background: rgba(228,0,43,0.08); border-left-color: #e4002b; }
  .oc-obj-img {
    width: 56px;
    height: 56px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255,255,255,0.04);
  }
  .oc-obj-placeholder {
    width: 56px;
    height: 56px;
    border-radius: 6px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.03);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #333;
  }
  .oc-obj-info { flex: 1; min-width: 0; }
  .oc-obj-title {
    font-size: 13px;
    font-weight: 500;
    color: #ddd;
    line-height: 1.3;
  }
  .oc-obj-artist { font-size: 11px; color: #888; margin-top: 2px; }
  .oc-obj-detail { font-size: 10px; color: #555; margin-top: 2px; }
  .oc-obj-desc {
    font-size: 11px;
    color: #666;
    line-height: 1.4;
    margin-top: 4px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .oc-obj-imgs-badge {
    display: inline-block;
    font-size: 9px;
    color: #888;
    background: rgba(255,255,255,0.05);
    padding: 2px 6px;
    border-radius: 8px;
    margin-top: 4px;
  }
  .oc-obj-highlight {
    display: inline-block;
    color: #e4002b;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .oc-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #333;
    font-size: 13px;
    text-align: center;
    padding: 40px;
    line-height: 1.6;
  }

  /* ─── Object detail view ─── */
  .od-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 0 24px;
  }
  .od-scroll::-webkit-scrollbar { width: 5px; }
  .od-scroll::-webkit-scrollbar-track { background: transparent; }
  .od-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

  .od-hero {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    background: #0a0a1a;
    display: block;
  }
  .od-images {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    padding: 3px;
  }
  .od-images img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 4px;
    cursor: pointer;
    background: rgba(255,255,255,0.03);
    transition: opacity 0.15s;
  }
  .od-images img:hover { opacity: 0.8; }

  .od-body { padding: 16px; }
  .od-title { font-size: 18px; font-weight: 600; color: #fff; line-height: 1.3; }
  .od-artist { font-size: 13px; color: #999; margin-top: 4px; }

  .od-meta-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 12px;
    margin-top: 14px;
    font-size: 12px;
  }
  .od-meta-label { color: #555; font-weight: 500; }
  .od-meta-value { color: #aaa; }

  .od-desc {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 13px;
    color: #999;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .od-link {
    display: inline-block;
    margin-top: 14px;
    font-size: 12px;
    color: #e4002b;
    text-decoration: none;
    font-weight: 500;
  }
  .od-link:hover { text-decoration: underline; }


  /* ─── Map overlay ─── */
  #map-floor-selector {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 10;
    background: rgba(26, 26, 46, 0.92);
    backdrop-filter: blur(12px);
    border-radius: 12px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .map-floor-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: #aaa;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .map-floor-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .map-floor-btn.active { background: #e4002b; border-color: #e4002b; color: #fff; }

  #hover-tooltip {
    display: none;
    position: fixed;
    z-index: 20;
    background: rgba(20, 20, 40, 0.96);
    backdrop-filter: blur(16px);
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    max-width: 280px;
    min-width: 180px;
    overflow: hidden;
    pointer-events: none;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .tt-header { padding: 8px 12px; }
  .tt-title { font-size: 13px; font-weight: 600; color: #fff; }
  .tt-subtitle { font-size: 10px; color: #e4002b; font-weight: 500; margin-top: 1px; }
  .tt-meta { font-size: 10px; color: #666; margin-top: 2px; }

  .gallery-label {
    color: rgba(255,255,255,0.45);
    font-size: 11px;
    font-weight: 600;
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    text-shadow: 0 0 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.6);
    pointer-events: none;
    white-space: nowrap;
    text-align: center;
    line-height: 1;
  }
  .gallery-label.has-data { color: #fff; }
</style>
</head>
<body>

<div id="app">
  <!-- Col 1: Gallery tree -->
  <div id="col-galleries">
    <div class="gc-header">
      <h1>The Met</h1>
      <div class="gc-stats" id="gc-stats"></div>
    </div>
    <div class="gc-floors" id="gc-floors"></div>
    <div class="gc-list" id="gc-list"></div>
  </div>

  <!-- Col 2: Object list -->
  <div id="col-objects" class="collapsed">
    <div class="oc-header" id="oc-header"></div>
    <div class="oc-list" id="oc-list"></div>
  </div>

  <!-- Col 3: Object detail + images -->
  <div id="col-image"></div>

  <!-- Col 4: Map -->
  <div id="map-wrap">
    <div id="map"></div>
    <div id="map-floor-selector"></div>
    <div id="hover-tooltip"></div>
  </div>
</div>

<script>
const FLOORS = [
  { id: 'Floor G', label: 'G' },
  { id: 'Floor 1', label: '1' },
  { id: 'Floor 1M', label: '1M' },
  { id: 'Floor 2', label: '2' },
  { id: 'Floor 3', label: '3' },
];

const SECTION_COLORS = {
  'Egyptian Art': '#c4943e',
  'The American Wing': '#3d7a5f',
  'Greek and Roman Art': '#7a5c3d',
  'Arms and Armor': '#5c5c5c',
  'Medieval Art': '#6b4c8a',
  'European Sculpture and Decorative Arts': '#4a7a9b',
  'Modern and Contemporary Art': '#9b4a6b',
  'Robert Lehman Wing': '#8a6b4c',
  'Robert Lehman Collection': '#8a6b4c',
  'The Great Hall': '#888',
  'Michael C. Rockefeller Wing': '#4c8a6b',
  'Arts of Africa': '#8a4c4c',
  'Arts of Oceania': '#4c6b8a',
  'Arts of the Ancient Americas': '#6b8a4c',
  'The Costume Institute': '#8a4c8a',
  '19th and Early 20th Century European Paintings and Sculpture': '#4a7a9b',
  'Art of the Arab Lands, Turkey, Iran, Central Asia, and Later South Asia': '#3d6b7a',
  'Asian Art': '#7a3d3d',
  'European Paintings, 1250\u20131800': '#3d5a7a',
  'Musical Instruments': '#7a6b3d',
  'Photographs': '#5a5a5a',
  'Drawings, Prints, and Photographs': '#5a5a5a',
  'Drawings and Prints': '#5a5a5a',
  'Art of Ancient West Asia and the Art of Ancient Cyprus': '#7a5c3d',
  'Ruth and Harold D. Uris Center for Education': '#3d7a7a',
  'The Iris and B.Gerald Cantor Roof Garden': '#4c8a4c',
};

let currentFloor = 'Floor 1';
let selectedGallery = null;
let galleryData, sectionData, otherRoomsData, floorOutlineData, galleryMetadata, galleryObjects;
let map;

async function loadData() {
  const [galleries, sections, otherRooms, metadata, floorOutlines, objects] = await Promise.all([
    fetch('../data/gallery_rooms.geojson').then(r => r.json()),
    fetch('../data/section_areas.geojson').then(r => r.json()),
    fetch('../data/other_rooms.geojson').then(r => r.json()),
    fetch('../data/all_galleries.json').then(r => r.json()),
    fetch('../data/floor_outlines.geojson').then(r => r.json()),
    fetch('../data/gallery_objects.json').then(r => r.json()),
  ]);
  galleryData = galleries;
  sectionData = sections;
  otherRoomsData = otherRooms;
  floorOutlineData = floorOutlines;
  galleryObjects = objects;
  galleryMetadata = {};
  metadata.forEach(g => { if (g.gallery_number) galleryMetadata[g.gallery_number] = g; });
}

function filterByFloor(gj, floor) {
  return { type: 'FeatureCollection', features: gj.features.filter(f => f.properties.floor_name === floor) };
}
function buildSectionColorExpr() {
  const e = ['match', ['get', 'name']];
  for (const [n, c] of Object.entries(SECTION_COLORS)) e.push(n, c);
  e.push('#555'); return e;
}
function buildHasDataFilter() { return ['in', 'gallery_number', ...Object.keys(galleryObjects)]; }
function buildNoDataFilter() { return ['!', buildHasDataFilter()]; }

// ─── Gallery column ───

function getFloorGalleries(floor) {
  return galleryData.features
    .filter(f => f.properties.floor_name === floor && f.properties.gallery_number)
    .map(f => {
      const num = f.properties.gallery_number;
      return { num, name: f.properties.popup_header || (galleryMetadata[num] && galleryMetadata[num].long_name) || '', objData: galleryObjects[num], props: f.properties };
    })
    .sort((a, b) => {
      const d = (b.objData ? 1 : 0) - (a.objData ? 1 : 0);
      return d !== 0 ? d : a.num.localeCompare(b.num, undefined, { numeric: true });
    });
}

function renderGalleryList() {
  const list = document.getElementById('gc-list');
  const galleries = getFloorGalleries(currentFloor);
  const withData = galleries.filter(g => g.objData);

  document.getElementById('gc-stats').textContent = `${currentFloor} \u2022 ${withData.length}/${galleries.length} with data`;

  let html = '';
  if (withData.length > 0) {
    html += `<div class="gc-section">With data (${withData.length})</div>`;
    withData.forEach(g => { html += galleryItem(g); });
  }
  const noData = galleries.filter(g => !g.objData);
  if (noData.length > 0) {
    html += `<div class="gc-section">No data (${noData.length})</div>`;
    noData.forEach(g => { html += galleryItem(g); });
  }
  list.innerHTML = html;

  // Handlers
  list.querySelectorAll('.gc-item').forEach(el => {
    el.addEventListener('click', () => {
      const num = el.dataset.num;
      selectGallery(num === selectedGallery ? null : num);
    });
    el.addEventListener('mouseenter', () => {
      if (map && map.getLayer('gallery-hover')) {
        map.setFilter('gallery-hover', ['==', 'gallery_number', el.dataset.num]);
      }
    });
    el.addEventListener('mouseleave', () => {
      if (map && map.getLayer('gallery-hover') && !selectedGallery) {
        map.setFilter('gallery-hover', ['==', 'gallery_number', '']);
      } else if (selectedGallery) {
        map.setFilter('gallery-hover', ['==', 'gallery_number', selectedGallery]);
      }
    });
  });
}

function galleryItem(g) {
  const active = g.num === selectedGallery ? ' active' : '';
  const cls = g.objData ? 'has-data' : 'no-data';
  const ct = g.objData ? `<span class="gc-ct">${g.objData.count}</span>` : '';
  return `<div class="gc-item ${cls}${active}" data-num="${g.num}"><span class="gc-num">${g.num}</span><span class="gc-name">${g.name}</span>${ct}</div>`;
}

// ─── Object column ───

function renderObjectPanel(num) {
  const col = document.getElementById('col-objects');
  const header = document.getElementById('oc-header');
  const list = document.getElementById('oc-list');

  if (!num) {
    col.classList.add('collapsed');
    // trigger map resize after transition
    setTimeout(() => map && map.resize(), 220);
    return;
  }

  col.classList.remove('collapsed');
  // Close detail column when switching galleries
  closeDetailColumn();
  setTimeout(() => map && map.resize(), 220);

  const meta = galleryMetadata[num];
  const objData = galleryObjects[num];
  const feat = galleryData.features.find(f => f.properties.gallery_number === num);
  const props = feat ? feat.properties : {};
  const title = props.popup_header || (meta && meta.long_name) || `Gallery ${num}`;
  const subtitle = props.popup_subheader || `Gallery ${num}`;
  const imgUrl = props.popup_image_url || (meta && meta.image_url);
  const desc = props.popup_body && props.popup_body !== 'This gallery has no description.' ? props.popup_body : (meta && meta.description) || '';

  let h = '';
  if (imgUrl) h += `<img class="oc-header-img" src="${imgUrl}" />`;
  h += `<div class="oc-title">${title}</div>`;
  h += `<div class="oc-subtitle">${subtitle}</div>`;
  if (objData) {
    const imgCt = objData.has_images || 0;
    const descCt = objData.has_descriptions || 0;
    h += `<div class="oc-meta">${objData.count} objects \u2022 ${imgCt} with images \u2022 ${objData.departments.join(', ')}</div>`;
  }
  if (desc) {
    const short = desc.length > 200 ? desc.slice(0, 200) + '...' : desc;
    h += `<div class="oc-desc">${short}</div>`;
  }
  header.innerHTML = h;

  // Object list
  if (!objData || objData.objects.length === 0) {
    list.innerHTML = `<div class="oc-empty">No object data yet for this gallery.<br>Data is being augmented.</div>`;
    return;
  }

  let ol = '';
  objData.objects.forEach((obj, idx) => {
    const hasImg = obj.image || (obj.images && obj.images.length > 0);
    const imgSrc = obj.image || (obj.images && obj.images.length > 0 ? obj.images[0].replace('/original/', '/web-large/') : '');

    ol += `<div class="oc-obj" data-idx="${idx}">`;
    if (imgSrc) {
      ol += `<img class="oc-obj-img" src="${imgSrc}" loading="lazy" />`;
    } else {
      ol += `<div class="oc-obj-placeholder">\u25A1</div>`;
    }
    ol += `<div class="oc-obj-info">`;
    if (obj.highlight) ol += `<div class="oc-obj-highlight">Highlight</div>`;
    ol += `<div class="oc-obj-title">${obj.title}</div>`;
    if (obj.artist) ol += `<div class="oc-obj-artist">${obj.artist}</div>`;

    // Rich metadata line: period, date, culture
    const meta1 = [obj.period, obj.date, obj.culture].filter(Boolean);
    if (meta1.length) ol += `<div class="oc-obj-detail">${meta1.join(' \u2022 ')}</div>`;

    // Classification + medium
    const meta2 = [obj.classification, obj.medium].filter(Boolean);
    if (meta2.length) ol += `<div class="oc-obj-detail">${meta2.join(' \u2022 ')}</div>`;

    // Curatorial description preview
    if (obj.description) {
      const d = obj.description.length > 120 ? obj.description.slice(0, 120) + '...' : obj.description;
      ol += `<div class="oc-obj-desc">${d}</div>`;
    }

    // Image count badge
    if (obj.images && obj.images.length > 1) {
      ol += `<div class="oc-obj-imgs-badge">${obj.images.length} images</div>`;
    }

    ol += `</div></div>`;
  });
  list.innerHTML = ol;
  list.scrollTop = 0;

  // Click handlers for each object row
  list.querySelectorAll('.oc-obj').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      // Highlight active row
      list.querySelectorAll('.oc-obj').forEach(r => r.classList.remove('active'));
      el.classList.add('active');
      openObjectDetail(objData.objects[idx]);
    });
  });
}

// ─── Object detail column (col-image becomes the detail+image column) ───

let ivImages = [];
let ivIndex = 0;

function openObjectDetail(obj) {
  const col = document.getElementById('col-image');
  col.classList.add('open');
  setTimeout(() => map && map.resize(), 220);

  ivImages = obj.images && obj.images.length > 0 ? obj.images : (obj.image ? [obj.image] : []);
  ivIndex = 0;

  renderDetailColumn(obj);
}

function closeDetailColumn() {
  document.getElementById('col-image').classList.remove('open');
  // Deselect object rows
  document.querySelectorAll('.oc-obj').forEach(r => r.classList.remove('active'));
  setTimeout(() => map && map.resize(), 220);
}

function renderDetailColumn(obj) {
  const col = document.getElementById('col-image');

  let h = '';

  // Top bar
  h += `<div class="iv-topbar"><div class="iv-title">${obj.title}</div><button class="iv-close" id="iv-close">&times;</button></div>`;

  // Scrollable content
  h += `<div class="od-scroll">`;

  // Hero image with nav
  if (ivImages.length > 0) {
    h += `<div class="iv-main">`;
    h += `<img id="iv-img" src="${ivImages[0]}" />`;
    if (ivImages.length > 1) {
      h += `<button class="iv-nav prev" id="iv-prev">&lsaquo;</button>`;
      h += `<button class="iv-nav next" id="iv-next">&rsaquo;</button>`;
    }
    h += `</div>`;

    // Thumbnail strip
    if (ivImages.length > 1) {
      h += `<div class="iv-thumbs" id="iv-thumbs">`;
      ivImages.forEach((url, i) => {
        const src = url.replace('/original/', '/web-large/');
        h += `<img class="iv-thumb ${i === 0 ? 'active' : ''}" src="${src}" data-iv-idx="${i}" loading="lazy" />`;
      });
      h += `</div>`;
    }
  }

  // Object metadata
  h += `<div class="od-body">`;
  if (obj.highlight) h += `<div class="oc-obj-highlight" style="margin-bottom:6px">Highlight</div>`;
  h += `<div class="od-title">${obj.title}</div>`;
  if (obj.artist) h += `<div class="od-artist">${obj.artist}</div>`;

  const fields = [
    ['Date', obj.date],
    ['Period', obj.period],
    ['Culture', obj.culture],
    ['Classification', obj.classification],
    ['Medium', obj.medium],
    ['Dimensions', obj.dimensions],
    ['Department', obj.department],
  ].filter(([, v]) => v);

  if (fields.length) {
    h += `<div class="od-meta-grid">`;
    fields.forEach(([label, value]) => {
      h += `<div class="od-meta-label">${label}</div><div class="od-meta-value">${value}</div>`;
    });
    h += `</div>`;
  }

  if (obj.description) {
    h += `<div class="od-desc">${obj.description}</div>`;
  }

  if (obj.url) {
    h += `<a class="od-link" href="${obj.url}" target="_blank">View on metmuseum.org \u2192</a>`;
  }

  h += `</div></div>`;

  col.innerHTML = h;

  // Attach handlers
  document.getElementById('iv-close').onclick = closeDetailColumn;

  if (ivImages.length > 1) {
    document.getElementById('iv-prev').onclick = () => { ivIndex = (ivIndex - 1 + ivImages.length) % ivImages.length; updateDetailImage(); };
    document.getElementById('iv-next').onclick = () => { ivIndex = (ivIndex + 1) % ivImages.length; updateDetailImage(); };
    col.querySelectorAll('.iv-thumb').forEach(t => {
      t.addEventListener('click', () => { ivIndex = parseInt(t.dataset.ivIdx); updateDetailImage(); });
    });
  }
}

function updateDetailImage() {
  const img = document.getElementById('iv-img');
  if (img) img.src = ivImages[ivIndex];

  document.querySelectorAll('.iv-thumb').forEach((t, i) => {
    t.classList.toggle('active', parseInt(t.dataset.ivIdx) === ivIndex);
  });
  const active = document.querySelector('.iv-thumb.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ─── Selection ───

function selectGallery(num) {
  selectedGallery = num;

  // Update gallery list active state
  document.querySelectorAll('.gc-item').forEach(el => {
    el.classList.toggle('active', el.dataset.num === num);
  });

  // Update object panel
  renderObjectPanel(num);

  // Highlight on map
  if (map && map.getLayer('gallery-hover')) {
    map.setFilter('gallery-hover', num ? ['==', 'gallery_number', num] : ['==', 'gallery_number', '']);
  }

  // Scroll gallery list item into view
  if (num) {
    const el = document.querySelector(`.gc-item[data-num="${num}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ─── Floor switching ───

function switchFloor(floor) {
  currentFloor = floor;
  selectedGallery = null;

  document.querySelectorAll('.gc-floor-pill').forEach(p => p.classList.toggle('active', p.dataset.floor === floor));
  document.querySelectorAll('.map-floor-btn').forEach(b => b.classList.toggle('active', b.dataset.floor === floor));

  map.getSource('floor-outline').setData(filterByFloor(floorOutlineData, floor));
  map.getSource('galleries').setData(filterByFloor(galleryData, floor));
  map.getSource('sections').setData(filterByFloor(sectionData, floor));
  map.getSource('other-rooms').setData(filterByFloor(otherRoomsData, floor));

  addGalleryLabels();
  renderGalleryList();
  renderObjectPanel(null);
  document.getElementById('hover-tooltip').style.display = 'none';
}

// ─── Map ───

function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8, sources: {},
      layers: [{ id: 'background', type: 'background', paint: { 'background-color': '#16213e' } }],
      glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf'
    },
    center: [-73.9635, 40.7794], zoom: 17.5, bearing: -61, pitch: 0, maxZoom: 21, minZoom: 15,
  });

  map.on('load', () => {
    map.addSource('floor-outline', { type: 'geojson', data: filterByFloor(floorOutlineData, currentFloor) });
    map.addSource('sections', { type: 'geojson', data: filterByFloor(sectionData, currentFloor) });
    map.addSource('other-rooms', { type: 'geojson', data: filterByFloor(otherRoomsData, currentFloor) });
    map.addSource('galleries', { type: 'geojson', data: filterByFloor(galleryData, currentFloor) });

    map.addLayer({ id: 'floor-outline-fill', type: 'fill', source: 'floor-outline', paint: { 'fill-color': '#1e2444', 'fill-opacity': 0.9 } });
    map.addLayer({ id: 'floor-outline-stroke', type: 'line', source: 'floor-outline', paint: { 'line-color': '#3a4070', 'line-width': 2 } });
    map.addLayer({ id: 'section-fills', type: 'fill', source: 'sections', paint: { 'fill-color': buildSectionColorExpr(), 'fill-opacity': 0.15 } });
    map.addLayer({ id: 'section-outlines', type: 'line', source: 'sections', paint: { 'line-color': buildSectionColorExpr(), 'line-width': 2, 'line-opacity': 0.5 } });
    map.addLayer({ id: 'other-room-fills', type: 'fill', source: 'other-rooms', paint: { 'fill-color': '#2a2a4a', 'fill-opacity': 0.6 } });
    map.addLayer({ id: 'other-room-outlines', type: 'line', source: 'other-rooms', paint: { 'line-color': '#444466', 'line-width': 0.5 } });

    // No-data galleries: grey
    map.addLayer({ id: 'gallery-fills-nodata', type: 'fill', source: 'galleries', paint: { 'fill-color': '#3a3a5a', 'fill-opacity': 0.3 }, filter: buildNoDataFilter() });
    map.addLayer({ id: 'gallery-outlines-nodata', type: 'line', source: 'galleries', paint: { 'line-color': '#4a4a6a', 'line-width': 1, 'line-opacity': 0.5 }, filter: buildNoDataFilter() });
    // Data galleries: red
    map.addLayer({ id: 'gallery-fills-data', type: 'fill', source: 'galleries', paint: { 'fill-color': '#e4002b', 'fill-opacity': 0.35 }, filter: buildHasDataFilter() });
    map.addLayer({ id: 'gallery-outlines-data', type: 'line', source: 'galleries', paint: { 'line-color': '#e4002b', 'line-width': 1.5, 'line-opacity': 0.9 }, filter: buildHasDataFilter() });
    // Hover/select
    map.addLayer({ id: 'gallery-hover', type: 'fill', source: 'galleries', paint: { 'fill-color': '#ff4466', 'fill-opacity': 0.6 }, filter: ['==', 'gallery_number', ''] });

    addGalleryLabels();

    // Map hover tooltip (compact)
    const tooltip = document.getElementById('hover-tooltip');
    let hoveredNum = null;

    function onHover(e) {
      map.getCanvas().style.cursor = 'pointer';
      const num = e.features[0].properties.gallery_number;
      if (!selectedGallery) map.setFilter('gallery-hover', ['==', 'gallery_number', num]);
      if (num !== hoveredNum) {
        hoveredNum = num;
        const meta = galleryMetadata[num];
        const objData = galleryObjects[num];
        const title = e.features[0].properties.popup_header || (meta && meta.long_name) || `Gallery ${num}`;
        let h = `<div class="tt-header"><div class="tt-title">${title}</div><div class="tt-subtitle">Gallery ${num}</div>`;
        if (objData) h += `<div class="tt-meta">${objData.count} objects</div>`;
        h += `</div>`;
        tooltip.innerHTML = h;
      }
      tooltip.style.display = 'block';
      let left = e.originalEvent.clientX + 16, top = e.originalEvent.clientY - 12;
      if (left + 290 > window.innerWidth) left = e.originalEvent.clientX - 290;
      tooltip.style.left = left + 'px';
      tooltip.style.top = top + 'px';
    }
    function onLeave() {
      map.getCanvas().style.cursor = '';
      if (!selectedGallery) map.setFilter('gallery-hover', ['==', 'gallery_number', '']);
      tooltip.style.display = 'none';
      hoveredNum = null;
    }
    function onClick(e) {
      const num = e.features[0].properties.gallery_number;
      selectGallery(num === selectedGallery ? null : num);
    }

    map.on('mousemove', 'gallery-fills-data', onHover);
    map.on('mousemove', 'gallery-fills-nodata', onHover);
    map.on('mouseleave', 'gallery-fills-data', onLeave);
    map.on('mouseleave', 'gallery-fills-nodata', onLeave);
    map.on('click', 'gallery-fills-data', onClick);
    map.on('click', 'gallery-fills-nodata', onClick);
    map.on('click', (e) => {
      if (!map.queryRenderedFeatures(e.point, { layers: ['gallery-fills-data', 'gallery-fills-nodata'] }).length) selectGallery(null);
    });
  });
}

let galleryMarkers = [];
function addGalleryLabels() {
  galleryMarkers.forEach(m => m.remove());
  galleryMarkers = [];
  galleryData.features.filter(f => f.properties.floor_name === currentFloor).forEach(feat => {
    const num = feat.properties.gallery_number;
    if (!num) return;
    const coords = feat.geometry.type === 'Polygon' ? feat.geometry.coordinates[0] : feat.geometry.coordinates[0][0];
    let sx = 0, sy = 0;
    const n = coords.length - 1;
    for (let i = 0; i < n; i++) { sx += coords[i][0]; sy += coords[i][1]; }
    const el = document.createElement('div');
    el.className = 'gallery-label' + (galleryObjects[num] ? ' has-data' : '');
    el.textContent = num;
    galleryMarkers.push(new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat([sx/n, sy/n]).addTo(map));
  });
}

// ─── Init ───

function buildUI() {
  const floors = document.getElementById('gc-floors');
  FLOORS.forEach(f => {
    const ct = galleryData.features.filter(ft => ft.properties.floor_name === f.id && galleryObjects[ft.properties.gallery_number]).length;
    const pill = document.createElement('button');
    pill.className = 'gc-floor-pill' + (f.id === currentFloor ? ' active' : '') + (ct > 0 ? ' has-content' : '');
    pill.dataset.floor = f.id;
    pill.innerHTML = `${f.label}<span class="pill-ct">${ct || ''}</span>`;
    pill.onclick = () => switchFloor(f.id);
    floors.appendChild(pill);
  });

  const mapSel = document.getElementById('map-floor-selector');
  FLOORS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'map-floor-btn' + (f.id === currentFloor ? ' active' : '');
    btn.dataset.floor = f.id;
    btn.textContent = f.label;
    btn.onclick = () => switchFloor(f.id);
    mapSel.appendChild(btn);
  });

  renderGalleryList();
}

async function main() {
  await loadData();
  buildUI();
  initMap();
}
main();
</script>
</body>
</html>
